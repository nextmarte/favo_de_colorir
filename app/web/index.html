<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Favo de Colorir — Ateliê de Cerâmica. Gestão de agenda, materiais, cobrança e comunidade.">
  <meta name="theme-color" content="#8D4B00">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Favo de Colorir">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Favo de Colorir</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #FFF8F4;
      font-family: 'Manrope', sans-serif;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #8D4B00;
    }
    .loading svg {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
    }
    .loading p {
      font-size: 14px;
      color: #554336;
      letter-spacing: 1px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #FCF2EA;
      border-top-color: #8D4B00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="16" fill="#8D4B00"/>
      <path d="M32 16c-4 0-7.5 2-9.5 5-2-1-4.5-1-6.5.5s-2.5 4-1.5 6c-2.5 2-4 5-3 8s4 5 7 5h27c3 0 6-2 7-5s-.5-6-3-8c1-2 .5-4.5-1.5-6s-4.5-1.5-6.5-.5c-2-3-5.5-5-9.5-5z" fill="#FFF8F4" stroke="#FFF8F4" stroke-width="1.5"/>
    </svg>
    <p>FAVO DE COLORIR</p>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
